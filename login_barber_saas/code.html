<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden selection:bg-primary/30 selection:text-primary">
<!-- Background texture/grain -->

<!-- Atmospheric Glow -->

<main class="relative z-10 w-full max-w-[440px]">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-6 shadow-2xl relative">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<span class="material-symbols-outlined text-on-primary-container text-4xl relative z-10">content_cut</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter">BarberPro</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-2">Premium Grooming Management</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-2xl p-10 flex flex-col gap-8">
<form class="flex flex-col gap-6" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">E-mail</label>

</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Senha</label>
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<input class="w-full h-12 bg-[#121213] border border-[#2D2D2E] rounded-lg px-4 font-body-md text-body-md text-on-surface gold-ring-focus transition-all placeholder:text-on-surface-variant/30" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary text-on-primary-fixed font-label-md text-label-md rounded-lg btn-interact transition-transform flex items-center justify-center gap-2 mt-2" type="submit">
                    Entrar

</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">ou</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>

<!-- Secondary Actions -->

<script>
        // Simple micro-interaction for password visibility if needed or other UI state
        const passwordInput = document.getElementById('password');
        
        // Example: Add a slight parallax effect to the card on mouse move
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset transform on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
